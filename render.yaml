services:
  - type: web
    name: ar-vacaciones-api
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Set these in the Render dashboard:
      # CLIENT_ORIGIN, ADMIN_EMAIL, ADMIN_PASSWORD, JWT_SECRET
      # SMOOBU_API_KEY, SMOOBU_CUSTOMER_ID
      # STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
